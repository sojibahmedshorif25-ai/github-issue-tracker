<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-base-200">

  <!-- Login Page (আগের মতো রাখলাম, তোমার প্রথম স্ক্রিনশট অনুসারে) -->
  <div id="loginPage" class="flex items-center justify-center min-h-screen bg-base-100">
    <div class="card w-full max-w-md shadow-2xl bg-base-100 p-10 border border-base-300">
      <div class="text-center mb-10">
        <div class="avatar mb-6">
          <div class="w-24 rounded-full">
            <img src="assets/github-logo.png" alt="GitHub Logo" />
          </div>
        </div>
        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-lg text-base-content/70 mt-2">Sign in to manage issues</p>
      </div>

      <div class="space-y-6">
        <div>
          <label class="label"><span class="label-text font-semibold">Username</span></label>
          <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full" />
          <p class="text-xs text-base-content/60 mt-1">Default: admin</p>
        </div>

        <div>
          <label class="label"><span class="label-text font-semibold">Password</span></label>
          <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full" />
          <p class="text-xs text-base-content/60 mt-1">Default: admin123</p>
        </div>

        <button id="signInBtn" class="btn btn-primary w-full py-3">Sign In</button>

        <div class="divider my-8">OR</div>

        <div class="text-center text-sm space-y-1">
          <p class="font-semibold">Demo Credentials:</p>
          <p>Username: <strong>admin</strong></p>
          <p>Password: <strong>admin123</strong></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Page -->
  <div id="mainPage" class="hidden min-h-screen flex flex-col">

    <div class="navbar bg-base-100 shadow sticky top-0 z-10">
      <div class="flex-1 px-8">
        <a class="btn btn-ghost normal-case text-2xl font-bold">GitHub Issues Tracker</a>
      </div>
      <div class="flex-none gap-4 px-8">
        <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered w-64" />
        <button class="btn btn-primary">+ New Issue</button>
      </div>
    </div>

    <div class="container mx-auto px-8 py-10 max-w-7xl flex-1">

      <!-- Top Header - exact match to your screenshot -->
      <div class="mb-12">
        <!-- Tabs + Legend -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 pb-6 border-b border-base-300">
          <div class="flex items-center gap-3">
            <button class="tab-btn active px-7 py-3 rounded-md bg-purple-600 text-white font-medium shadow-sm" data-status="all">All</button>
            <button class="tab-btn px-7 py-3 rounded-md border border-base-300 bg-base-100 text-base-content font-medium" data-status="open">Open</button>
            <button class="tab-btn px-7 py-3 rounded-md border border-base-300 bg-base-100 text-base-content font-medium" data-status="closed">Closed</button>
          </div>

          <div class="flex items-center gap-6 text-sm font-medium">
            <div class="flex items-center gap-2">
              <span class="inline-block w-3 h-3 rounded-full bg-green-500"></span>
              Open
            </div>
            <div class="flex items-center gap-2">
              <span class="inline-block w-3 h-3 rounded-full bg-purple-600"></span>
              Closed
            </div>
          </div>
        </div>

        <!-- Issue Count with icon -->
        <div class="mt-8 flex items-center gap-5">
          <div class="avatar placeholder">
            <div class="bg-purple-100 text-purple-600 rounded-full w-14">
              <!-- Icon - তুমি assets-এ aperture.png বা অন্য icon রাখতে পারো -->
              <span class="text-2xl">⚙️</span> <!-- placeholder gear icon -->
            </div>
          </div>
          <div>
            <h2 id="issueCount" class="text-4xl font-bold">50 Issues</h2>
            <p class="text-base-content/70 text-lg mt-1">Track and manage your project issues</p>
          </div>
        </div>
      </div>

      <div id="loading" class="hidden flex justify-center my-20">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>

      <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>
  </div>

  <!-- Modal -->
  <dialog id="issueModal" class="modal">
    <div class="modal-box max-w-3xl">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <h3 id="modalTitle" class="font-bold text-xl mb-4"></h3>
      <div class="space-y-4 text-sm">
        <p><strong>Description:</strong> <span id="modalDesc"></span></p>
        <p><strong>Status:</strong> <span id="modalStatus" class="badge px-4 py-2"></span></p>
        <p><strong>Author:</strong> <span id="modalAuthor"></span></p>
        <p><strong>Priority:</strong> <span id="modalPriority"></span></p>
        <p><strong>Label:</strong> <span id="modalLabel" class="badge badge-outline px-4 py-2"></span></p>
        <p><strong>Created At:</strong> <span id="modalCreated"></span></p>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
